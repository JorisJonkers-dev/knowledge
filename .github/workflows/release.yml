name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        continue-on-error: true
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-images:
    name: Publish Image (${{ matrix.image }})
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: knowledge-api
            dockerfile: api/Dockerfile
          - image: knowledge-ingest-worker
            dockerfile: ingest-worker/Dockerfile
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and publish image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/jorisjonkers-dev/knowledge/${{ matrix.image }}:${{ needs.release-please.outputs.tag_name }}
            ghcr.io/jorisjonkers-dev/knowledge/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=knowledge-${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=knowledge-${{ matrix.image }}
          secrets: |
            github_token=${{ github.token }}
            github_actor=${{ github.actor }}

  publish-maven:
    name: Publish Maven Clients
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Publish JVM clients
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew :clients:java:publish :clients:kotlin:publish --no-daemon --no-parallel --max-workers=1

  publish-npm:
    name: Publish TypeScript Client
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: https://npm.pkg.github.com
          scope: '@jorisjonkers-dev'
          cache: pnpm

      - name: Enable pnpm
        run: corepack enable

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @jorisjonkers-dev/knowledge-api-client generate
          pnpm --filter @jorisjonkers-dev/knowledge-api-client build
          pnpm --filter @jorisjonkers-dev/knowledge-api-client publish --no-git-checks --access public
