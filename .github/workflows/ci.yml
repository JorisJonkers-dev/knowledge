'name': 'CI'

'on':
  'pull_request':
  'push':
    'branches':
      - 'main'
  'workflow_dispatch':

'concurrency':
  'group': 'ci-${{ github.workflow }}-${{ github.ref }}'
  'cancel-in-progress': '${{ github.ref != ''refs/heads/main'' }}'

'permissions':
  'contents': 'read'
  'packages': 'read'
  'pull-requests': 'read'

'jobs':
  'jvm':
    'name': 'JVM'
    'uses': 'JorisJonkers-dev/github-workflows/.github/workflows/jvm-ci.yml@v0.8.1'
    'with':
      'lint-gradle-args': ':api:detektMain :api:detektTest :api:detektIntegrationTest :api:ktlintCheck'
      'test-gradle-args': ':api:test :api:integrationTest :api:jacocoTestCoverageVerification :api:exportOpenApiSpec'
    'secrets':
      'packages-token': '${{ secrets.GITHUB_TOKEN }}'

  'python-lint':
    'name': 'Python Lint'
    'uses': 'JorisJonkers-dev/github-workflows/.github/workflows/python-ci.yml@v0.8.1'
    'with':
      'python-version': '3.12'
      'working-directory': 'ingest-worker'
      'install-command': 'python -m pip install uv==0.7.8 && uv sync --frozen'
      'lint-command': 'uv run ruff check . && uv run mypy'
      'test-command': ''

  'python-unit':
    'name': 'Python Unit'
    'uses': 'JorisJonkers-dev/github-workflows/.github/workflows/python-ci.yml@v0.8.1'
    'with':
      'python-version': '3.12'
      'working-directory': 'ingest-worker'
      'install-command': 'python -m pip install uv==0.7.8 && uv sync --frozen'
      'lint-command': ''
      'test-command': 'uv run pytest --cov'

  'python-integration':
    'name': 'Python Integration'
    'uses': 'JorisJonkers-dev/github-workflows/.github/workflows/python-ci.yml@v0.8.1'
    'with':
      'python-version': '3.12'
      'working-directory': 'ingest-worker'
      'install-command': 'python -m pip install uv==0.7.8 && uv sync --frozen'
      'lint-command': ''
      'test-command': 'uv run pytest -m integration'

  'contract':
    'name': 'Contract Drift'
    'runs-on': 'ubuntu-latest'
    'env':
      'GITHUB_ACTOR': '${{ github.actor }}'
      'GITHUB_TOKEN': '${{ secrets.GITHUB_TOKEN }}'
    'steps':
      - 'uses': 'actions/checkout@v6'
        'with':
          'fetch-depth': 0

      - 'uses': 'actions/setup-java@v5'
        'with':
          'distribution': 'temurin'
          'java-version': '21'

      - 'name': 'Check OpenAPI drift'
        'uses': 'JorisJonkers-dev/api-contract-checks@v1.1.0'
        'with':
          'profile': 'knowledge-api'
          'spec-path': 'client-spec/openapi/knowledge-api.json'
          'export-command': './gradlew :api:exportOpenApiSpec --no-daemon'
          'guidance': './gradlew :api:exportOpenApiSpec'

      - 'name': 'Prepare base contract'
        'env':
          'BASE_REF': '${{ github.base_ref || ''main'' }}'
        'run': |
          set -euo pipefail
          mkdir -p .contract
          git fetch --depth=1 origin "$BASE_REF:refs/remotes/origin/$BASE_REF"
          if git cat-file -e "origin/$BASE_REF:client-spec/openapi/knowledge-api.json"; then
            git show "origin/$BASE_REF:client-spec/openapi/knowledge-api.json" > .contract/base-knowledge-api.json
          else
            git show "origin/$BASE_REF:knowledge-api/openapi.json" > .contract/base-knowledge-api.json
          fi
          jq '
            del(.paths["/mcp"])
            | del(
                .components.schemas.JsonNode,
                .components.schemas.JsonRpcError,
                .components.schemas.JsonRpcRequest,
                .components.schemas.JsonRpcResponse
              )
          ' .contract/base-knowledge-api.json > .contract/base-knowledge-api.normalized.json
          mv .contract/base-knowledge-api.normalized.json .contract/base-knowledge-api.json

      - 'name': 'Check breaking OpenAPI changes'
        'uses': 'oasdiff/oasdiff-action/breaking@v0'
        'with':
          'base': '.contract/base-knowledge-api.json'
          'revision': 'client-spec/openapi/knowledge-api.json'
          'fail-on': 'WARN'

  'client-dry-run':
    'name': 'Client Dry Run'
    'uses': 'JorisJonkers-dev/github-workflows/.github/workflows/publish-api-clients.yml@v0.8.1'
    'permissions':
      'contents': 'read'
      'packages': 'write'
      'id-token': 'write'
    'with':
      'spec-path': 'client-spec/openapi/knowledge-api.json'
      'api-name': 'knowledge-api'
      'version': '0.0.0-ci.${{ github.run_number }}.${{ github.run_attempt }}'
      'ts-package': '@jorisjonkers-dev/knowledge-api-client'
      'maven-group': 'dev.jorisjonkers'
      'java-artifact': 'knowledge-api-client-java'
      'kotlin-artifact': 'knowledge-api-client-kotlin'
      'openapi-client-gradle-version': '0.3.1'
      'dry-run': true
    'secrets':
      'packages-token': '${{ secrets.GITHUB_TOKEN }}'
      'node-auth-token': '${{ secrets.GITHUB_TOKEN }}'

  'docker':
    'name': 'Docker Dry Run'
    'runs-on': 'ubuntu-latest'
    'steps':
      - 'uses': 'actions/checkout@v6'

      - 'uses': 'docker/setup-buildx-action@v4'

      - 'name': 'Build knowledge-api image'
        'uses': 'docker/build-push-action@v7'
        'with':
          'context': '.'
          'file': 'api/Dockerfile'
          'push': false
          'tags': 'ghcr.io/jorisjonkers-dev/knowledge/knowledge-api:${{ github.sha }}'
          'secrets': |
            github_token=${{ secrets.GITHUB_TOKEN }}
            github_actor=${{ github.actor }}
          'build-args': |
            GIT_SHA=${{ github.sha }}

      - 'name': 'Build knowledge-ingest-worker image'
        'uses': 'docker/build-push-action@v7'
        'with':
          'context': '.'
          'file': 'ingest-worker/Dockerfile'
          'push': false
          'tags': 'ghcr.io/jorisjonkers-dev/knowledge/knowledge-ingest-worker:${{ github.sha }}'
          'build-args': |
            GIT_SHA=${{ github.sha }}

  'deploy-bundle':
    'name': 'Deploy Bundle Dry Run'
    'uses': 'JorisJonkers-dev/github-workflows/.github/workflows/deploy-bundle.yml@v0.8.1'
    'permissions':
      'contents': 'read'
      'packages': 'write'
    'with':
      'deploy-dir': 'deploy'
      'images': 'deploy/images.json'
      'package-version': '0.9.0'
      'version': '0.0.0-ci.${{ github.run_number }}.${{ github.run_attempt }}'
      'bundle-name': 'knowledge'
      'publish': false
    'secrets':
      'packages-token': '${{ secrets.GITHUB_TOKEN }}'

  'migration-guard':
    'name': 'Migration Guard'
    'uses': 'JorisJonkers-dev/github-workflows/.github/workflows/migration-guard.yml@v0.8.1'
    'with':
      'migration-regex': 'api/src/main/resources/db/migration(-pg)?/V(1[3-9]|[2-9][0-9]|[1-9][0-9]{2,})[^/]*\.sql$'
      'scope-regex': '(api/src/main/resources/db)/.*'

  'pipeline-complete':
    'name': 'Pipeline Complete'
    'if': 'always()'
    'needs':
      - 'jvm'
      - 'python-lint'
      - 'python-unit'
      - 'python-integration'
      - 'contract'
      - 'client-dry-run'
      - 'docker'
      - 'deploy-bundle'
      - 'migration-guard'
    'runs-on': 'ubuntu-latest'
    'steps':
      - 'name': 'Verify all gating jobs succeeded'
        'uses': 're-actors/alls-green@release/v1'
        'with':
          'jobs': '${{ toJSON(needs) }}'
